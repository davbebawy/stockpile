add_product:
  name: Add product
  description: Create a catalog product (a reusable definition; not a physical item).
  fields:
    name:
      required: true
      example: Ground Beef
      selector:
        text:
    brand:
      example: Costco
      selector:
        text:
    unit:
      example: lb
      selector:
        text:
    category:
      example: Meat
      selector:
        text:
    image:
      description: Path served by HA, e.g. /local/stockpile/beef.jpg
      selector:
        text:
    aliases:
      selector:
        object:
    threshold:
      description: Low-stock threshold in whole-package equivalents.
      selector:
        number:
          min: 0
          step: 0.5
          mode: box

add_package:
  name: Add package
  description: Add a physical package. Reference an existing product_id, or pass name/brand to find-or-create one.
  fields:
    product_id:
      example: prod_1a2b3c4d
      selector:
        text:
    name:
      example: Ground Beef
      selector:
        text:
    brand:
      example: Costco
      selector:
        text:
    remaining:
      default: 100
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    quantity:
      default: 1
      selector:
        number:
          min: 0
          step: 0.1
          mode: box
    location_id:
      selector:
        text:
    frozen:
      selector:
        date:
    expires:
      selector:
        date:
    notes:
      selector:
        text:

consume:
  name: Consume
  description: Reduce a package's remaining percentage and log the event.
  fields:
    package_id:
      required: true
      selector:
        text:
    amount:
      required: true
      description: Percent to consume (10, 25, 50, 100...).
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    who:
      selector:
        text:

set_remaining:
  name: Set remaining
  description: Set a package's remaining percentage to an absolute value.
  fields:
    package_id:
      required: true
      selector:
        text:
    remaining:
      required: true
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    who:
      selector:
        text:

remove_package:
  name: Remove package
  fields:
    package_id:
      required: true
      selector:
        text:

remove_product:
  name: Remove product
  description: Deletes the product and all its packages.
  fields:
    product_id:
      required: true
      selector:
        text:

add_location:
  name: Add location
  fields:
    name:
      required: true
      example: Freezer Bottom Basket
      selector:
        text:
    parent:
      selector:
        text:

get_summary:
  name: Get summary
  description: Returns aggregated per-product inventory (package counts and remaining). Returns response data.

list_packages:
  name: List packages
  description: Returns all packages, optionally filtered by location. Returns response data.
  fields:
    location_id:
      selector:
        text:

reorder:
  name: Reorder packages
  description: Set the manual display order. Pass package ids in the desired order.
  fields:
    package_ids:
      required: true
      selector:
        object:

seed_demo:
  name: Load demo data
  description: Populate realistic test data across Freezer/Pantry/Garage. Skips if already seeded.

export:
  name: Export
  description: Return the full Stockpile dataset as a JSON-serializable object (use response_variable to capture it).

import_data:
  name: Import
  description: Restore from an `export` payload. Use replace=true to wipe existing data first; otherwise rows are upserted by id.
  fields:
    data:
      required: true
      description: Object previously produced by stockpile.export.
      selector:
        object:
    replace:
      default: false
      selector:
        boolean:

compose_notification:
  name: Compose notification
  description: Build a short text summary of low-stock and expiring-soon items suitable for notifications. Returns title/message and counts.
  fields:
    kind:
      default: all
      selector:
        select:
          options:
            - all
            - low
            - expiring
    limit:
      default: 20
      selector:
        number:
          min: 1
          max: 200
          mode: box

snooze:
  name: Snooze product alerts
  description: Suppress low-stock and expiring alerts for one product. Provide hours, days, or an explicit until timestamp.
  fields:
    product_id:
      required: true
      selector:
        text:
    hours:
      selector:
        number:
          min: 0
          step: 1
          mode: box
    days:
      selector:
        number:
          min: 0
          step: 1
          mode: box
    until:
      description: ISO 8601 timestamp. Mutually exclusive with hours and days.
      selector:
        text:

acknowledge:
  name: Acknowledge product
  description: Mark a product as reviewed (clears any active snooze and records the timestamp).
  fields:
    product_id:
      required: true
      selector:
        text:

push_to_todo:
  name: Push to a todo list
  description: Add low-stock or expiring items to a Home Assistant todo list entity. Dedupes against existing items by default.
  fields:
    entity_id:
      required: true
      selector:
        entity:
          domain: todo
    kind:
      default: low
      selector:
        select:
          options:
            - low
            - expiring
            - all
    dedupe:
      default: true
      selector:
        boolean:

set_package_position:
  name: Set package floor-plan position
  description: >
    Pin a package to a specific x/y coordinate on its location's floor-plan
    canvas. Omit loc_x and loc_y (or pass null) to move the package back to
    the unpositioned tray.
  fields:
    package_id:
      required: true
      selector:
        text:
    loc_x:
      description: Horizontal position as a percentage (0–100) of the canvas width.
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          mode: box
    loc_y:
      description: Vertical position as a percentage (0–100) of the canvas height.
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          mode: box

set_location_template:
  name: Set location floor-plan template
  description: >
    Assign a schematic floor-plan template to a location and store its
    configuration (number of shelves, baskets, etc.). Available template IDs:
    chest_freezer, wire_rack, refrigerator. Pass null for template_id to
    remove the template.
  fields:
    location_id:
      required: true
      selector:
        text:
    template_id:
      description: Template ID — chest_freezer, wire_rack, or refrigerator.
      selector:
        text:
    template_config:
      description: JSON string with template-specific config keys (e.g. '{"shelves":5}').
      selector:
        text:

parse_receipt:
  name: Parse receipt
  description: >
    Parse raw receipt text and return a list of product suggestions. Each
    suggestion includes the cleaned name, quantity, unit, and whether it
    matches an existing catalog product. Intended to be called from the
    Stockpile card UI or an automation script; use response_variable to
    capture the result.
  fields:
    text:
      required: true
      description: Raw receipt text (paste directly from clipboard or OCR output).
      example: "GROUND BEEF 80/20 3LB    $8.99\nPASTA 12OZ    $1.89"
      selector:
        text:
          multiline: true

suggest_restock:
  name: Suggest restock
  description: >
    Returns products that are likely to run out within a time horizon (based on
    velocity), or that are already below their low-stock threshold. Each entry
    includes a suggested quantity to order to restore comfortable stock levels.
    Use response_variable to capture the result.
  fields:
    velocity_days:
      default: 30
      description: Window in days used to compute average daily consumption.
      selector:
        number:
          min: 1
          max: 365
          unit_of_measurement: days
          mode: box
    horizon_days:
      default: 14
      description: Flag a product if it will run out within this many days at current velocity.
      selector:
        number:
          min: 1
          max: 365
          unit_of_measurement: days
          mode: box
